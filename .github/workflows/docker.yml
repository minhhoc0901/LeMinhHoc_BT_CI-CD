name: Build and Push Docker Image

on:
  push:
    branches: ["main"]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: minhhoc0901/leminhhoc-app
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="minhhoc0901/leminhhoc-app"
          CONTAINER_PORT=8080
          
          echo "Đợi Docker Hub cập nhật metadata..."
          sleep 15
          
          # Tự động chọn dấu nối tham số (? hoặc &) tùy theo DEPLOY_URL có sẵn tham số chưa
          URL="${{ secrets.DEPLOY_URL }}"
          if [[ "$URL" == *\?* ]]; then SEP="&"; else SEP="?"; fi
          
          echo "Gửi yêu cầu triển khai (POST)..."
          # Ép dùng --http1.1 và thêm Content-Length: 0 để tránh lỗi proxy 502
          RESPONSE=$(curl -sS --http1.1 -H "Content-Length: 0" \
            --retry 3 --retry-delay 5 --retry-all-errors \
            -w "\n%{http_code}" -X POST \
            "${URL}${SEP}repo=$REPO&tag=latest&slot=1&container_port=$CONTAINER_PORT&strict_container_port=0")
          
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
